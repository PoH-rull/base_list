<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ציוד בבסיס</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap');

  :root {
    --bg:       #0f1014;
    --card:     #161820;
    --card2:    #1a1c26;
    --border:   #252840;
    --border2:  #1e2035;
    --accent:   #6c8ebf;
    --accent2:  #4a6a9a;
    --accent-bg:#0e1628;
    --text:     #c8cfe0;
    --dim:      #4e566e;
    --danger:   #c0392b;
    --warn:     #d4831a;
    --ok:       #4a9e6a;
    --radius:   12px;
    --radius-sm:8px;
    --fab-h:    80px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    padding-bottom: calc(var(--fab-h) + 24px);
    overscroll-behavior: none;
  }

  /* ── TOP BAR ─────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,15,11,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border2);
    padding: 12px 16px 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .topbar-title { flex: 1; font-size: 17px; font-weight: 900; color: var(--accent); letter-spacing: -0.3px; }
  .topbar-sub   { font-size: 11px; color: var(--dim); font-weight: 400; display: block; }

  .icon-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--dim);
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: all 0.15s; flex-shrink: 0;
  }
  .icon-btn:hover, .icon-btn:active { border-color: var(--accent); color: var(--accent); }
  .icon-btn.active { background: var(--accent-bg); border-color: var(--accent2); color: var(--accent); }

  /* ── MAIN CONTENT ────────────────────────── */
  .main { padding: 14px 14px 0; max-width: 560px; margin: 0 auto; }

  /* ── STATS ROW ───────────────────────────── */
  .stats {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 8px; text-align: center;
  }
  .stat-n { font-size: 24px; font-weight: 900; line-height: 1; color: var(--accent); }
  .stat-n.red { color: var(--danger); }
  .stat-l { font-size: 10px; color: var(--dim); margin-top: 3px; letter-spacing: 0.3px; }

  /* Progress */
  .prog-wrap { margin-bottom: 14px; }
  .prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-bottom: 5px; }
  .prog-row b { color: var(--accent); }
  .prog-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  /* ── FILTER CHIPS ────────────────────────── */
  .chips-wrap {
    display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px;
    scrollbar-width: none;
  }
  .chips-wrap::-webkit-scrollbar { display: none; }
  .chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; font-family: 'Heebo', sans-serif;
    font-size: 12px; color: var(--dim); padding: 5px 13px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .chip:hover { border-color: var(--accent2); color: var(--text); }
  .chip.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .chip.bring-chip {
    background: var(--accent-bg); border-color: var(--accent2);
    color: var(--accent); font-weight: 700; margin-right: auto;
  }
  .chip.bring-chip:hover { background: var(--accent); color: #0d0f0b; }

  /* ── CATEGORY GROUP ──────────────────────── */
  .cat-group { margin-bottom: 8px; }
  .cat-label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: var(--dim); text-transform: uppercase;
    padding: 10px 2px 6px; border-bottom: 1px solid var(--border2);
    margin-bottom: 5px;
  }
  .cat-status { font-weight: 400; letter-spacing: 0; font-size: 10px; }
  .cat-status.ok { color: var(--ok); }
  .cat-status.bad { color: var(--danger); }

  /* ── ITEM CARD ───────────────────────────── */
  .item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 6px;
    transition: border-color 0.2s; overflow: hidden;
  }
  .item.missing { border-color: rgba(192,57,43,0.25); }
  .item.full    { border-color: rgba(74,158,106,0.2); }

  .item-row {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px;
  }

  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .item.missing .item-name { color: var(--text); }
  .item.full    .item-name { color: var(--dim); }
  .item-meta { font-size: 11px; color: var(--dim); margin-top: 1px; }

  /* Fraction tap target */
  .frac {
    font-size: 12px; font-weight: 700;
    padding: 4px 8px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; font-family: 'Heebo', sans-serif;
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    min-width: 46px; text-align: center;
  }
  .frac.ok   { color: var(--ok);     border-color: rgba(74,158,106,0.3); }
  .frac.low  { color: var(--warn);    border-color: rgba(212,131,26,0.3); }
  .frac.zero { color: var(--danger);  border-color: rgba(192,57,43,0.3);  }
  .frac:hover { border-color: var(--accent); }

  /* Stepper */
  .stepper {
    display: flex; align-items: center;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0;
  }
  .step-btn {
    background: transparent; border: none; color: var(--dim);
    font-size: 20px; font-weight: 300; line-height: 1;
    width: 34px; height: 34px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s; user-select: none;
  }
  .step-btn:active { background: var(--border); }
  .step-btn.minus:active { color: var(--danger); }
  .step-btn.plus:active  { color: var(--accent); }
  .step-num {
    min-width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; cursor: pointer;
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    position: relative;
  }
  .step-num.ok   { color: var(--ok); }
  .step-num.low  { color: var(--warn);   }
  .step-num.zero { color: var(--danger); }
  .step-num input {
    position: absolute; inset: 0; width: 100%; height: 100%;
    background: var(--accent-bg); border: none;
    outline: 2px solid var(--accent) inset;
    color: var(--accent); font-family: 'Heebo', sans-serif;
    font-size: 14px; font-weight: 700; text-align: center; display: none;
  }
  .step-num.editing input { display: block; }
  .step-num.editing span  { opacity: 0; }

  /* Edit panel */
  .edit-panel {
    max-height: 0; overflow: hidden;
    transition: max-height 0.28s cubic-bezier(.4,0,.2,1);
    background: var(--card2); border-top: 1px solid transparent;
  }
  .edit-panel.open { max-height: 180px; border-top-color: var(--border2); }
  .edit-panel-inner { padding: 12px 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .ep-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ep-label { font-size: 11px; color: var(--dim); white-space: nowrap; flex-shrink: 0; }
  .ep-input {
    flex: 1; min-width: 80px; background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px;
    padding: 7px 10px; border-radius: var(--radius-sm); outline: none; direction: rtl;
    transition: border-color 0.15s;
  }
  .ep-input:focus { border-color: var(--accent); }
  .ep-select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    font-family: 'Heebo', sans-serif; font-size: 12px;
    padding: 7px 8px; border-radius: var(--radius-sm); outline: none; cursor: pointer; flex: 1;
  }
  .ep-num { width: 58px; text-align: center; }
  .ep-save {
    background: var(--accent); border: none; color: #0d0f0b;
    font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 700;
    padding: 7px 16px; border-radius: var(--radius-sm); cursor: pointer;
    transition: background 0.15s; white-space: nowrap;
  }
  .ep-save:hover { background: #7fa3d4; }
  .ep-delete {
    background: transparent; border: 1px solid rgba(192,57,43,0.3); color: var(--danger);
    font-family: 'Heebo', sans-serif; font-size: 12px;
    padding: 7px 12px; border-radius: var(--radius-sm); cursor: pointer;
    transition: all 0.15s;
  }
  .ep-delete:hover { background: rgba(192,57,43,0.1); border-color: var(--danger); }

  /* ── EMPTY ───────────────────────────────── */
  .empty {
    text-align: center; padding: 48px 20px;
    color: var(--dim); font-size: 14px; line-height: 1.7;
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* ── FAB (floating add button) ───────────── */
  .fab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
    background: rgba(15,16,20,0.96);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid var(--border2);
    padding: 10px 20px env(safe-area-inset-bottom, 14px);
  }
  .fab-btn {
    display: block; width: 100%; max-width: 520px;
    margin: 0 auto; height: 50px;
    background: var(--accent); border: none; border-radius: 25px;
    color: #fff; font-family: 'Heebo', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 24px rgba(108,142,191,0.3);
  }
  .fab-btn:active { transform: scale(0.97); opacity: 0.85; }

  /* ── ADD SHEET (slides up from FAB) ─────── */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 70; display: flex; align-items: flex-end; justify-content: center;
    animation: fadein 0.15s ease;
  }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .sheet {
    background: var(--card); border: 1px solid var(--border);
    border-bottom: none; border-radius: 16px 16px 0 0;
    width: 100%; max-width: 560px;
    padding: 8px 18px 32px;
    animation: slideup 0.22s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 10px auto 18px;
  }
  .sheet-title { font-size: 15px; font-weight: 900; color: var(--accent); margin-bottom: 16px; }
  .sheet-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
  .sheet-input {
    flex: 1; background: var(--card2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px;
    padding: 11px 13px; border-radius: var(--radius-sm); outline: none;
    direction: rtl; transition: border-color 0.15s;
  }
  .sheet-input::placeholder { color: var(--dim); }
  .sheet-input:focus { border-color: var(--accent); }
  .sheet-select {
    flex: 1; background: var(--card2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Heebo', sans-serif; font-size: 13px;
    padding: 11px 10px; border-radius: var(--radius-sm); outline: none; cursor: pointer;
  }
  .sheet-select option, .ep-select option, select option {
    background: #1a1c26;
    color: #c8cfe0;
  }
  .sheet-num {
    width: 64px; text-align: center;
    background: var(--card2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px;
    padding: 11px 8px; border-radius: var(--radius-sm); outline: none;
  }
  .sheet-num:focus, .sheet-input:focus, .sheet-select:focus { border-color: var(--accent); }
  .sheet-add-btn {
    width: 100%; height: 46px; background: var(--accent); border: none;
    border-radius: var(--radius); color: #0d0f0b;
    font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
    margin-top: 4px;
  }
  .sheet-add-btn:active { opacity: 0.85; }

  /* ── SETTINGS SHEET ──────────────────────── */
  .settings-sheet {
    background: var(--card); border: 1px solid var(--border);
    border-bottom: none; border-radius: 16px 16px 0 0;
    width: 100%; max-width: 560px;
    padding: 8px 18px 36px;
    max-height: 85vh; overflow-y: auto;
    animation: slideup 0.22s cubic-bezier(.4,0,.2,1);
  }
  .settings-section { margin-bottom: 20px; }
  .settings-sec-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--dim); text-transform: uppercase; margin-bottom: 10px; }
  .tag-row { display: flex; gap: 7px; align-items: center; }
  .tag-input {
    flex: 1; background: var(--card2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Heebo', sans-serif; font-size: 13px; padding: 9px 11px;
    border-radius: var(--radius-sm); outline: none; direction: rtl;
  }
  .tag-input:focus { border-color: var(--accent); }
  .tag-add-btn {
    background: var(--accent-bg); border: 1px solid var(--accent2); color: var(--accent);
    font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 700;
    padding: 9px 14px; border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap;
  }
  .tag-add-btn:hover { background: var(--accent); color: #0d0f0b; }
  .tags-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag-pill {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 20px; font-size: 12px; color: var(--text-dim);
    padding: 4px 10px 4px 6px; display: flex; align-items: center; gap: 5px;
  }
  .tag-del { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 0; line-height: 1; }
  .tag-del:hover { color: var(--danger); }

  /* toggle row in settings */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border2);
  }
  .toggle-label { font-size: 14px; }
  .toggle-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .toggle {
    width: 44px; height: 26px; border-radius: 13px;
    background: var(--border); cursor: pointer; border: none;
    position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle::after {
    content: ''; position: absolute; top: 3px; right: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--dim); transition: all 0.2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { right: calc(100% - 23px); background: #0d0f0b; }

  /* ── BRING SHEET ─────────────────────────── */
  .bring-sheet {
    background: var(--card); border: 1px solid var(--border);
    border-bottom: none; border-radius: 16px 16px 0 0;
    width: 100%; max-width: 560px;
    padding: 8px 18px 36px; max-height: 85vh; overflow-y: auto;
    animation: slideup 0.22s cubic-bezier(.4,0,.2,1);
  }
  .bring-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px; background: var(--card2);
    border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 6px; cursor: pointer; transition: all 0.2s;
  }
  .bring-item.done {
    opacity: 0.45; border-color: var(--ok);
    background: rgba(74,158,106,0.06);
  }
  .bring-item.done .bring-name { text-decoration: line-through; color: var(--dim); }
  .bring-check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.2s;
  }
  .bring-item.done .bring-check { background: var(--ok); border-color: var(--ok); color: #fff; }
  .bring-num { font-size: 20px; font-weight: 900; color: var(--accent); min-width: 26px; }
  .bring-info { flex: 1; }
  .bring-name { font-size: 14px; font-weight: 600; }
  .bring-sub  { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .bring-need { font-size: 13px; font-weight: 700; color: var(--danger); white-space: nowrap; background: rgba(192,57,43,0.1); padding: 3px 8px; border-radius: 5px; flex-shrink: 0; }
  .bring-empty { text-align: center; padding: 36px 0; color: var(--dim); font-size: 14px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div style="flex:1">
    <div class="topbar-title" id="topbarTitle">ציוד בבסיס</div>
    <span class="topbar-sub" id="topbarSub">טוען...</span>
  </div>
  <button class="icon-btn" onclick="toggleLang()" id="langBtn" title="שפה / Language">EN</button>
  <button class="icon-btn" onclick="showBring()" title="מה להביא">📋</button>
  <button class="icon-btn" onclick="showSettings()" title="הגדרות">⚙️</button>
</div>

<div class="main">

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l" id="statLItems">פריטים</div></div>
    <div class="stat"><div class="stat-n" id="sFull">0</div><div class="stat-l" id="statLFull">מלא</div></div>
    <div class="stat"><div class="stat-n red" id="sMiss">0</div><div class="stat-l" id="statLMiss">חסר</div></div>
  </div>

  <!-- PROGRESS -->
  <div class="prog-wrap">
    <div class="prog-row"><span id="progLabel">כמה מהרשימה מלא</span><b id="sPct">0%</b></div>
    <div class="prog-bg"><div class="prog-fill" id="sBar" style="width:0%"></div></div>
  </div>

  <!-- FILTER CHIPS -->
  <div class="chips-wrap" id="chipsWrap">
    <div class="chip active" onclick="setFilter('all')"    id="chipAll">הכל</div>
    <div class="chip"        onclick="setFilter('missing')" id="chipMissing">חסר</div>
    <div class="chip"        onclick="setFilter('full')"    id="chipFull">מלא</div>
    <!-- cat chips injected here -->
  </div>

  <!-- LIST -->
  <div id="itemList"></div>

</div>

<!-- FAB -->
<div class="fab-bar">
  <button class="fab-btn" id="fabBtn" onclick="showAddSheet()">+ הוסף פריט</button>
</div>

<!-- ═══════ SHEETS ═══════ -->

<!-- ADD SHEET -->
<div class="sheet-overlay" id="addSheet" style="display:none" onclick="if(event.target===this)hideAddSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">הוספת פריט</div>
    <div class="sheet-row">
      <input class="sheet-input" id="sName" placeholder="שם הפריט..." onkeydown="if(event.key==='Enter')document.getElementById('sQty').focus()">
      <input class="sheet-num"   id="sQty"  type="number" placeholder="יעד" min="1" onkeydown="if(event.key==='Enter')submitAdd()">
    </div>
    <div class="sheet-row">
      <select class="sheet-select" id="sCat"></select>
      <select class="sheet-select" id="sBag" style="display:none"></select>
    </div>
    <button class="sheet-add-btn" id="sheetAddBtn" onclick="submitAdd()">הוסף לרשימה</button>
  </div>
</div>

<!-- SETTINGS SHEET -->
<div class="sheet-overlay" id="settingsSheet" style="display:none" onclick="if(event.target===this)hideSettings()">
  <div class="settings-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="settingsTitle">הגדרות</div>

    <!-- Toggles -->
    <div class="settings-section">
      <div class="toggle-row">
        <div>
          <div class="toggle-label" id="togBagsLabel">הצגת תיקים</div>
          <div class="toggle-sub" id="togBagsSub">הצג/הסתר עמודת תיק לכל פריט</div>
        </div>
        <button class="toggle on" id="toggleBags" onclick="toggleBagsVis()"></button>
      </div>
    </div>

    <!-- Categories -->
    <div class="settings-section">
      <div class="settings-sec-title" id="secCatsTitle">קטגוריות</div>
      <div class="tag-row">
        <input class="tag-input" id="newCat" placeholder="קטגוריה חדשה..." onkeydown="if(event.key==='Enter')addCat()">
        <button class="tag-add-btn" onclick="addCat()">הוסף</button>
      </div>
      <div class="tags-list" id="catList"></div>
    </div>

    <!-- Bags -->
    <div class="settings-section" id="bagSection">
      <div class="settings-sec-title" id="secBagsTitle">תיקים / מיקומים</div>
      <div class="tag-row">
        <input class="tag-input" id="newBag" placeholder="תיק חדש..." onkeydown="if(event.key==='Enter')addBag()">
        <button class="tag-add-btn" onclick="addBag()">הוסף</button>
      </div>
      <div class="tags-list" id="bagList"></div>
    </div>

    <!-- Export / Import -->
    <div class="settings-section">
      <div class="settings-sec-title" id="secDataTitle">נתונים</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="tag-add-btn" id="exportBtn" onclick="exportData()" style="flex:1;justify-content:center;display:flex">📤 <span id="exportLabel">ייצא רשימה</span></button>
        <button class="tag-add-btn" id="importBtn" onclick="document.getElementById('importFile').click()" style="flex:1;justify-content:center;display:flex">📥 <span id="importLabel">ייבא רשימה</span></button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <div id="importMsg" style="font-size:12px;color:var(--ok);margin-top:8px;display:none"></div>
    </div>

    <button class="sheet-add-btn settings-close-btn" onclick="hideSettings()" style="margin-top:8px">סגור</button>
  </div>
</div>

<!-- BRING SHEET -->
<div class="sheet-overlay" id="bringSheet" style="display:none" onclick="if(event.target===this)hideBring()">
  <div class="bring-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="bringTitle">📋 מה להביא לבסיס</div>
    <div id="bringList"></div>
    <button class="sheet-add-btn bring-close-btn" onclick="hideBring()" style="margin-top:8px">סגור</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   STORAGE KEYS
══════════════════════════════════════════════ */
const K_ITEMS = 'base-inv-v5';
const K_CATS  = 'base-inv-cats-v5';
const K_BAGS  = 'base-inv-bags-v5';
const K_UI    = 'base-inv-ui-v5';

const DEF_CATS = [];
const DEF_BAGS = [];

let items   = [];
let cats    = [];
let bags    = [];
let ui      = { showBags: true };
let filter  = 'all';
let catFilter = '';
let openPanel = null;
let editingId = null;

/* ═══════════════════════════════════════════
   LOAD / SAVE
══════════════════════════════════════════════ */
function load() {
  cats  = JSON.parse(localStorage.getItem(K_CATS) || 'null') || [...DEF_CATS];
  bags  = JSON.parse(localStorage.getItem(K_BAGS) || 'null') || [...DEF_BAGS];
  ui    = JSON.parse(localStorage.getItem(K_UI)   || 'null') || { showBags: true };

  const saved = localStorage.getItem(K_ITEMS);
  if (saved) {
    items = JSON.parse(saved);
  } else {
    // migrate from v4
    const old = localStorage.getItem('base-inventory-v4');
    if (old) {
      items = JSON.parse(old).map(i => ({ ...i, cat: i.cat || 'אחר', bag: i.bag || '' }));
    } else {
      // Also check v5 variant used in previous version
      const old5 = localStorage.getItem('base-inventory-v5');
      if (old5) {
        items = JSON.parse(old5).map(i => ({ ...i, cat: i.cat || 'אחר', bag: i.bag || '' }));
      } else {
        items = [];
      }
    }
  }
}
function save() {
  localStorage.setItem(K_ITEMS, JSON.stringify(items));
  localStorage.setItem(K_CATS,  JSON.stringify(cats));
  localStorage.setItem(K_BAGS,  JSON.stringify(bags));
  localStorage.setItem(K_UI,    JSON.stringify(ui));
}

/* ═══════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════ */
function setFilter(f, cat) {
  if (f !== undefined) {
    filter = f;
    ['All','Missing','Full'].forEach(x =>
      document.getElementById('chip'+x).classList.toggle('active', x.toLowerCase() === f)
    );
  }
  if (cat !== undefined) catFilter = cat;
  render();
}

/* ═══════════════════════════════════════════
   TOGGLES
══════════════════════════════════════════════ */
function toggleBagsVis() {
  ui.showBags = !ui.showBags;
  document.getElementById('toggleBags').classList.toggle('on', ui.showBags);
  document.getElementById('bagSection').style.display = ui.showBags ? '' : 'none';
  // also hide bag select in add sheet
  const bagSel = document.getElementById('sBag');
  if (bagSel) bagSel.style.display = ui.showBags ? '' : 'none';
  save(); render();
}

/* ═══════════════════════════════════════════
   CATEGORIES & BAGS
══════════════════════════════════════════════ */
function refreshCatUI() {
  document.getElementById('catList').innerHTML = cats.map((c, i) => `
    <div class="tag-pill">${esc(c)}
      <button class="tag-del" onclick="delCat(${i})">✕</button>
    </div>`).join('');

  const wrap = document.getElementById('chipsWrap');
  wrap.querySelectorAll('.cat-chip').forEach(el => el.remove());
  cats.forEach(c => {
    const el = document.createElement('div');
    el.className = 'chip cat-chip' + (catFilter === c ? ' active' : '');
    el.textContent = c;
    el.onclick = () => {
      catFilter = catFilter === c ? '' : c;
      wrap.querySelectorAll('.cat-chip').forEach(x => x.classList.toggle('active', x.textContent === catFilter));
      render();
    };
    wrap.appendChild(el);
  });

  const sc = document.getElementById('sCat');
  const cur = sc.value;
  sc.innerHTML = cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  if (cur && cats.includes(cur)) sc.value = cur;
}

function refreshBagUI() {
  document.getElementById('bagList').innerHTML = bags.map((b, i) => `
    <div class="tag-pill">${esc(b)}
      <button class="tag-del" onclick="delBag(${i})">✕</button>
    </div>`).join('');

  const sb = document.getElementById('sBag');
  const cur = sb.value;
  sb.innerHTML = '<option value="">ללא תיק</option>' + bags.map(b => `<option value="${esc(b)}">${esc(b)}</option>`).join('');
  if (cur) sb.value = cur;
  sb.style.display = ui.showBags ? '' : 'none';

  document.getElementById('bagSection').style.display = ui.showBags ? '' : 'none';
  document.getElementById('toggleBags').classList.toggle('on', ui.showBags);
}

function addCat() {
  const inp = document.getElementById('newCat');
  const v = inp.value.trim();
  if (!v || cats.includes(v)) return;
  cats.push(v); inp.value = '';
  save(); refreshCatUI();
}
async function delCat(i) {
  const c = cats[i];
  if (!c) return;
  const ok = await showConfirm(t().cat_del_confirm(c), '', lang==='he'?'מחק':'Delete');
  if (!ok) return;
  cats.splice(i, 1);
  items.forEach(item => { if (item.cat === c) item.cat = cats[0] || ''; });
  save(); refreshCatUI(); render();
}

function addBag() {
  const inp = document.getElementById('newBag');
  const v = inp.value.trim();
  if (!v || bags.includes(v)) return;
  bags.push(v); inp.value = '';
  save(); refreshBagUI();
}
function delBag(i) {
  const b = bags[i];
  if (!b) return;
  bags.splice(i, 1);
  items.forEach(item => { if (item.bag === b) item.bag = ''; });
  save(); refreshBagUI(); render();
}

/* ═══════════════════════════════════════════
   ADD SHEET
══════════════════════════════════════════════ */
function showAddSheet() {
  refreshCatUI(); refreshBagUI();
  document.getElementById('addSheet').style.display = 'flex';
  setTimeout(() => document.getElementById('sName').focus(), 300);
}
function hideAddSheet() { document.getElementById('addSheet').style.display = 'none'; }

function submitAdd() {
  const name = document.getElementById('sName').value.trim();
  const qty  = parseInt(document.getElementById('sQty').value) || 1;
  const cat  = document.getElementById('sCat').value || '';
  const bag  = ui.showBags ? (document.getElementById('sBag').value || '') : '';
  if (!name) { document.getElementById('sName').focus(); return; }
  items.push({ id: Date.now(), name, target: qty, qty, cat, bag });
  document.getElementById('sName').value = '';
  document.getElementById('sQty').value  = '';
  save(); render(); hideAddSheet();
}

/* ═══════════════════════════════════════════
   SETTINGS SHEET
══════════════════════════════════════════════ */
function showSettings() {
  refreshCatUI(); refreshBagUI();
  document.getElementById('settingsSheet').style.display = 'flex';
}
function hideSettings() { document.getElementById('settingsSheet').style.display = 'none'; }

/* ═══════════════════════════════════════════
   BRING SHEET
══════════════════════════════════════════════ */
function showBring() {
  const s = t();
  const missing = [...items]
    .filter(i => i.qty < i.target)
    .sort((a,b) => (a.cat||'').localeCompare(b.cat||'','he') || a.name.localeCompare(b.name,'he'));

  const el = document.getElementById('bringList');
  if (!missing.length) {
    el.innerHTML = `<div class="bring-empty">${s.bring_empty}</div>`;
  } else {
    el.innerHTML = missing.map((item, i) => `
      <div class="bring-item" id="bi-${item.id}" onclick="toggleBringDone(${item.id})">
        <div class="bring-check" id="bc-${item.id}"></div>
        <div class="bring-info">
          <div class="bring-name">${esc(item.name)}</div>
          <div class="bring-sub">${esc(item.cat||'')}${ui.showBags && item.bag ? ' · ' + esc(item.bag) : ''}</div>
        </div>
        <span class="bring-need" id="bn-${item.id}">${s.bring_miss(item.target - item.qty)}</span>
      </div>`).join('');
  }
  document.getElementById('bringSheet').style.display = 'flex';
}

function toggleBringDone(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const el = document.getElementById('bi-' + id);
  if (!el) return;

  const isDone = el.classList.contains('done');
  if (isDone) {
    // unmark — restore original qty
    item.qty = item._bringPrev ?? item.qty;
    delete item._bringPrev;
    el.classList.remove('done');
    document.getElementById('bc-' + id).textContent = '';
    document.getElementById('bn-' + id).textContent = t().bring_miss(item.target - item.qty);
  } else {
    // mark as done — set qty to target
    item._bringPrev = item.qty;
    item.qty = item.target;
    el.classList.add('done');
    document.getElementById('bc-' + id).textContent = '✓';
    document.getElementById('bn-' + id).textContent = '✓';
  }
  save(); updateStats();
}

function hideBring() { document.getElementById('bringSheet').style.display = 'none'; }
function chQty(id, d) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  it.qty = Math.max(0, it.qty + d);
  save(); refreshItem(id); updateStats();
}
function startEdit(id) {
  if (editingId !== null) finishEdit(editingId);
  editingId = id;
  const el = document.getElementById('sn-'+id);
  if (!el) return;
  el.classList.add('editing');
  const inp = el.querySelector('input');
  inp.value = items.find(i=>i.id===id)?.qty ?? 0;
  inp.focus(); inp.select();
}
function finishEdit(id) {
  if (editingId !== id) return;
  editingId = null;
  const it = items.find(i=>i.id===id);
  const el = document.getElementById('sn-'+id);
  if (!it || !el) return;
  const v = parseInt(el.querySelector('input').value);
  if (!isNaN(v) && v >= 0) it.qty = v;
  el.classList.remove('editing');
  refreshItem(id); save(); updateStats();
}

/* ═══════════════════════════════════════════
   EDIT PANEL
══════════════════════════════════════════════ */
function togglePanel(id) {
  const p = document.getElementById('ep-'+id);
  if (!p) return;
  if (openPanel === id) { p.classList.remove('open'); openPanel = null; return; }
  if (openPanel !== null) { const pp = document.getElementById('ep-'+openPanel); if(pp) pp.classList.remove('open'); }
  openPanel = id;
  p.classList.add('open');
  const it = items.find(i=>i.id===id);
  document.getElementById('epn-'+id).value = it.name;
  document.getElementById('ept-'+id).value = it.target;
  setTimeout(() => document.getElementById('ept-'+id).focus(), 60);
}
function applyEdit(id) {
  const it = items.find(i=>i.id===id);
  if (!it) return;
  const name   = document.getElementById('epn-'+id).value.trim();
  const target = parseInt(document.getElementById('ept-'+id).value);
  const cat    = document.getElementById('epc-'+id).value;
  const bag    = document.getElementById('epb-'+id)?.value || '';
  if (name) it.name = name;
  if (!isNaN(target) && target >= 1) it.target = target;
  it.cat = cat; it.bag = bag;
  const p = document.getElementById('ep-'+id);
  if (p) p.classList.remove('open');
  openPanel = null;
  save(); render();
}
async function delItem(id) {
  const it = items.find(i=>i.id===id);
  const ok = await showConfirm(t().del_confirm, it ? esc(it.name) : '');
  if (!ok) return;
  items = items.filter(i=>i.id!==id);
  save(); render();
}

/* ═══════════════════════════════════════════
   STATS
══════════════════════════════════════════════ */
function updateStats() {
  const total = items.length;
  const full  = items.filter(i => i.qty >= i.target).length;
  const miss  = total - full;
  const pct   = total ? Math.round(full/total*100) : 0;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sFull').textContent  = full;
  document.getElementById('sMiss').textContent  = miss;
  document.getElementById('sPct').textContent   = pct+'%';
  document.getElementById('sBar').style.width   = pct+'%';
  document.getElementById('topbarSub').textContent = total ? t().sub_full(full,total) : t().sub_empty;
}

/* ═══════════════════════════════════════════
   REFRESH SINGLE
══════════════════════════════════════════════ */
function qc(it) { return it.qty===0?'zero':it.qty<it.target?'low':'ok'; }
function refreshItem(id) {
  const it = items.find(i=>i.id===id);
  if (!it) return;
  const el = document.getElementById('item-'+id);
  if (!el) return;
  const cls = qc(it);
  el.className = 'item '+(it.qty===0?'missing':it.qty>=it.target?'full':'missing');
  const fb = document.getElementById('fb-'+id);
  if (fb) { fb.textContent=it.qty+'/'+it.target; fb.className='frac '+cls; }
  const sn = document.getElementById('sn-'+id);
  if (sn) { sn.querySelector('span').textContent=it.qty; sn.className='step-num '+cls; }
}

/* ═══════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  updateStats();
  const list = document.getElementById('itemList');

  let filtered = [...items];
  if (filter === 'full')    filtered = filtered.filter(i=>i.qty>=i.target);
  if (filter === 'missing') filtered = filtered.filter(i=>i.qty<i.target);
  if (catFilter)            filtered = filtered.filter(i=>i.cat===catFilter);

  // Sort: incomplete first, then by cat + name
  filtered.sort((a,b) => {
    const af = a.qty >= a.target, bf = b.qty >= b.target;
    if (!af && bf) return -1;
    if (af && !bf) return 1;
    const cc = a.cat.localeCompare(b.cat,'he');
    return cc !== 0 ? cc : a.name.localeCompare(b.name,'he');
  });

  if (!filtered.length) {
    list.innerHTML = items.length === 0
      ? `<div class="empty"><div class="empty-icon">📦</div>${t().empty_list}<br><small>${t().empty_hint}</small></div>`
      : `<div class="empty"><div class="empty-icon">✅</div>${t().empty_filter}</div>`;
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(it => { const g = it.cat || '—'; (groups[g] = groups[g] || []).push(it); });

  let html = '';
  for (const [cat, gItems] of Object.entries(groups)) {
    const gMiss = gItems.filter(i=>i.qty<i.target).length;
    html += `<div class="cat-group">
      <div class="cat-label">${esc(cat)}
        <span class="cat-status ${gMiss?'bad':'ok'}">${gMiss ? gMiss+' '+t().stat_miss : '✓ '+t().chip_full}</span>
      </div>`;
    gItems.forEach(it => {
      const cls     = qc(it);
      const itemCls = 'item '+(it.qty>=it.target?'full':'missing');
      const isOpen  = openPanel === it.id;
      const bagLine = ui.showBags && it.bag ? ` · ${esc(it.bag)}` : '';
      html += `
      <div class="${itemCls}" id="item-${it.id}">
        <div class="item-row">
          <div class="item-info">
            <div class="item-name">${esc(it.name)}</div>
            <div class="item-meta">${esc(it.cat)}${bagLine}</div>
          </div>
          <button class="frac ${cls}" id="fb-${it.id}" onclick="togglePanel(${it.id})">${it.qty}/${it.target}</button>
          <div class="stepper">
            <button class="step-btn minus" onclick="chQty(${it.id},-1)">−</button>
            <div class="step-num ${cls}" id="sn-${it.id}" onclick="startEdit(${it.id})">
              <span>${it.qty}</span>
              <input type="number" min="0"
                onclick="event.stopPropagation()"
                onblur="finishEdit(${it.id})"
                onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();finishEdit(${it.id});}if(event.key==='Escape'){editingId=null;document.getElementById('sn-${it.id}').classList.remove('editing');}">
            </div>
            <button class="step-btn plus" onclick="chQty(${it.id},1)">+</button>
          </div>
        </div>
        <div class="edit-panel ${isOpen?'open':''}" id="ep-${it.id}">
          <div class="edit-panel-inner">
            <div class="ep-row">
              <span class="ep-label">${t().ep_name}</span>
              <input class="ep-input" id="epn-${it.id}" type="text" value="${esc(it.name)}" onkeydown="if(event.key==='Enter')applyEdit(${it.id})">
              <span class="ep-label">${t().ep_target}</span>
              <input class="ep-input ep-num" id="ept-${it.id}" type="number" value="${it.target}" min="1" onkeydown="if(event.key==='Enter')applyEdit(${it.id})">
            </div>
            <div class="ep-row">
              <span class="ep-label">${t().ep_cat}</span>
              <select class="ep-select" id="epc-${it.id}">
                ${cats.map(c=>`<option value="${esc(c)}"${it.cat===c?' selected':''}>${esc(c)}</option>`).join('')}
              </select>
              ${ui.showBags ? `<span class="ep-label">${t().ep_bag}</span>
              <select class="ep-select" id="epb-${it.id}">
                <option value="">${t().ep_no_bag}</option>
                ${bags.map(b=>`<option value="${esc(b)}"${it.bag===b?' selected':''}>${esc(b)}</option>`).join('')}
              </select>` : `<input type="hidden" id="epb-${it.id}" value="${esc(it.bag)}">`}
            </div>
            <div class="ep-row">
              <button class="ep-save" onclick="applyEdit(${it.id})">${t().ep_save}</button>
              <button class="ep-delete" onclick="delItem(${it.id})">${t().ep_del}</button>
            </div>
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  list.innerHTML = html;
}

/* ═══════════════════════════════════════════
   CUSTOM CONFIRM (confirm() blocked in local files)
══════════════════════════════════════════════ */
let _confirmCb = null;
function showConfirm(msg, sub, okLabel) {
  return new Promise(resolve => {
    _confirmCb = resolve;
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmSub').textContent = sub || '';
    document.getElementById('confirmOk').textContent  = okLabel || (lang==='he'?'מחק':'Delete');
    document.getElementById('confirmCancel').textContent = lang==='he'?'ביטול':'Cancel';
    document.getElementById('confirmDialog').style.display = 'flex';
  });
}
function confirmResolve(val) {
  document.getElementById('confirmDialog').style.display = 'none';
  if (_confirmCb) { _confirmCb(val); _confirmCb = null; }
}

    bring_miss: n => `Need ${n}`,
    settings_title: 'Settings',
    tog_bags: 'Show bags', tog_bags_sub: 'Show/hide bag field per item',
    sec_cats: 'Categories', sec_bags: 'Bags / Locations',
    cat_ph: 'New category...', bag_ph: 'New bag...',
    add_tag: 'Add', close: 'Close',
    ep_name: 'Name', ep_target: 'Target', ep_cat: 'Cat', ep_bag: 'Bag',
    ep_save: 'Save', ep_del: 'Delete item',
    ep_no_bag: 'None', del_confirm: 'Delete this item?',
    cat_del_confirm: c => `Delete "${c}"? Items will move to first category`,
    empty_list: 'List is empty', empty_hint: 'Tap "+ Add Item" to get started',
    empty_filter: 'No items to show',
    cat_all: 'All categories', no_bag: 'No bag',
    reset_confirm: 'Reset all quantities to 0?',
    sec_data: 'Data', export_label: 'Export list', import_label: 'Import list',
    dir: 'ltr', lang_label: 'עב',
  }
};

let lang = localStorage.getItem('base-inv-lang') || 'he';
function t() { return STRINGS[lang]; }

function toggleLang() {
  lang = lang === 'he' ? 'en' : 'he';
  localStorage.setItem('base-inv-lang', lang);
  applyLang();
  render();
}

function applyLang() {
  const s = t();
  document.documentElement.lang = lang;
  document.documentElement.dir  = s.dir;
  document.getElementById('langBtn').textContent = s.lang_label;

  // Static strings
  setText('topbarTitle',    s.title);
  setText('fabBtn',         s.fab);
  setText('chipAll',        s.chip_all);
  setText('chipMissing',    s.chip_miss);
  setText('chipFull',       s.chip_full);
  setText('progLabel',      s.prog_label);
  setText('statLItems',     s.stat_items);
  setText('statLFull',      s.stat_full);
  setText('statLMiss',      s.stat_miss);
  setAttr('sName','placeholder', s.sh_name_ph);
  setAttr('sQty', 'placeholder', s.sh_qty_ph);
  setText('sheetTitle',     s.sheet_title);
  setText('sheetAddBtn',    s.sh_add);
  setText('bringTitle',     s.bring_title);
  setText('settingsTitle',  s.settings_title);
  setText('togBagsLabel',   s.tog_bags);
  setText('togBagsSub',     s.tog_bags_sub);
  setText('secCatsTitle',   s.sec_cats);
  setText('secBagsTitle',   s.sec_bags);
  setAttr('newCat','placeholder', s.cat_ph);
  setAttr('newBag','placeholder', s.bag_ph);
  setText('secDataTitle',   s.sec_data);
  setText('exportLabel',    s.export_label);
  setText('importLabel',    s.import_label);
  document.querySelectorAll('.tag-add-btn:not(#exportBtn):not(#importBtn)').forEach(b => b.textContent = s.add_tag);
  document.querySelectorAll('.settings-close-btn').forEach(b => b.textContent = s.close);
  document.querySelectorAll('.bring-close-btn').forEach(b => b.textContent = s.close);

  // Update topbar sub
  const total = items.length;
  const full  = items.filter(i=>i.qty>=i.target).length;
  setText('topbarSub', total ? s.sub_full(full,total) : s.sub_empty);

  // refresh cat chips text from new lang (they're generated, just re-call)
  refreshCatUI();
}

function setText(id, v) { const e=document.getElementById(id); if(e) e.textContent=v; }
function setAttr(id, a, v) { const e=document.getElementById(id); if(e) e.setAttribute(a,v); }

/* ═══════════════════════════════════════════
   EXPORT / IMPORT
══════════════════════════════════════════════ */
function exportData() {
  const payload = {
    version: 1,
    exported: new Date().toISOString(),
    items, cats, bags, ui
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href     = url;
  a.download = `base-inventory-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      // validate minimal structure
      if (!Array.isArray(data.items)) throw new Error('Invalid file');

      const ok = await showConfirm(
        lang === 'he' ? 'ייבא רשימה?' : 'Import list?',
        lang === 'he'
          ? `יוחלפו ${items.length} פריטים קיימים ב-${data.items.length} פריטים חדשים`
          : `Replace ${items.length} existing items with ${data.items.length} new items`,
        lang === 'he' ? 'ייבא' : 'Import'
      );
      if (!ok) { e.target.value = ''; return; }

      items = data.items;
      if (Array.isArray(data.cats)) cats = data.cats;
      if (Array.isArray(data.bags)) bags = data.bags;
      if (data.ui) ui = { ...ui, ...data.ui };

      save();
      refreshCatUI();
      refreshBagUI();
      applyLang();
      render();

      // show success msg
      const msg = document.getElementById('importMsg');
      msg.textContent = lang === 'he'
        ? `✓ יובאו ${items.length} פריטים בהצלחה`
        : `✓ Imported ${items.length} items successfully`;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 3000);

    } catch {
      const msg = document.getElementById('importMsg');
      msg.style.color = 'var(--danger)';
      msg.textContent = lang === 'he' ? '✗ קובץ לא תקין' : '✗ Invalid file';
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; msg.style.color = 'var(--ok)'; }, 3000);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

/* ═══════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
load();
refreshCatUI();
refreshBagUI();
applyLang();
render();
</script>

      <button onclick="confirmResolve(true)"  style="flex:1;height:44px;background:var(--danger);border:none;border-radius:var(--radius);color:#fff;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer" id="confirmOk">מחק</button>
    </div>
  </div>
</div>
