<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ציוד בבסיס</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div style="flex:1;min-width:0">
    <div class="topbar-title" id="topbarTitle">ציוד בבסיס</div>
    <span class="topbar-sub" id="topbarSub">טוען...</span>
  </div>
  <button class="icon-btn" id="searchBtn" onclick="toggleSearch()" title="חיפוש">🔍</button>
  <button class="icon-btn" onclick="showBring()" title="מה להביא">📋</button>
  <button class="icon-btn" onclick="showSettings()" title="הגדרות">⚙️</button>
  <button class="icon-btn" onclick="toggleLang()" id="langBtn">EN</button>
</div>

<div class="search-bar" id="searchBar">
  <div class="search-inner">
    <input class="search-input" id="searchInput" placeholder="חפש פריט..." oninput="render()" />
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l" id="statLItems">פריטים</div></div>
    <div class="stat"><div class="stat-n grn" id="sFull">0</div><div class="stat-l" id="statLFull">מלא</div></div>
    <div class="stat"><div class="stat-n red" id="sMiss">0</div><div class="stat-l" id="statLMiss">חסר</div></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-row"><span id="progLabel">כמה מהרשימה מלא</span><b id="sPct">0%</b></div>
    <div class="prog-bg"><div class="prog-fill" id="sBar" style="width:0%"></div></div>
  </div>

  <div class="chips-outer"><div class="chips-wrap" id="chipsWrap">
    <div class="chip active" onclick="setFilter('all')"     id="chipAll">הכל</div>
    <div class="chip"        onclick="setFilter('missing')" id="chipMissing">חסר</div>
    <div class="chip"        onclick="setFilter('full')"    id="chipFull">מלא</div>
    <div class="chip loc-bag"  onclick="setLocFilter('bag')"    id="chipBag">🎒 תיק</div>
    <div class="chip loc-clos" onclick="setLocFilter('closet')" id="chipCloset">🗄️ ארון</div>
  </div></div>

  <div id="itemList"></div>
</div>

<div class="fab-bar">
  <button class="fab-btn" id="fabBtn" onclick="showAddSheet()">+ הוסף פריט</button>
</div>

<!-- ADD SHEET -->
<div class="sheet-overlay" id="addSheet" style="display:none" onclick="if(event.target===this)hideAddSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">הוספת פריט</div>
    <div class="sheet-row">
      <input class="sheet-input" id="sName" placeholder="שם הפריט..." onkeydown="if(event.key==='Enter')document.getElementById('sQty').focus()">
      <input class="sheet-num" id="sQty" type="number" placeholder="יעד" min="1" onkeydown="if(event.key==='Enter')submitAdd()">
    </div>
    <div class="sheet-row">
      <select class="sheet-select" id="sCat"></select>
    </div>
    <div class="sheet-row" id="sLocRow">
      <div class="seg" id="sLocSeg">
        <button class="seg-btn active" onclick="setSLoc('')"       id="sLoc0">—</button>
        <button class="seg-btn"        onclick="setSLoc('bag')"    id="sLoc1">🎒 <span id="sLoc1lbl">תיק</span></button>
        <button class="seg-btn"        onclick="setSLoc('closet')" id="sLoc2">🗄️ <span id="sLoc2lbl">ארון</span></button>
      </div>
    </div>
    <div class="add-success" id="addSuccess"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="sheet-add-btn" style="flex:1" id="sheetAddBtn" onclick="submitAdd()">הוסף לרשימה</button>
      <button class="sheet-add-btn" style="flex:0 0 80px;background:var(--card2);color:var(--text)" onclick="hideAddSheet()" id="sheetDoneBtn">סגור</button>
    </div>
  </div>
</div>

<!-- SETTINGS SHEET -->
<div class="sheet-overlay" id="settingsSheet" style="display:none" onclick="if(event.target===this)hideSettings()">
  <div class="sheet sheet-lg">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="settingsTitle">הגדרות</div>

    <div class="sheet-sec" id="secCatsTitle">קטגוריות</div>
    <div class="tag-row">
      <input class="tag-input" id="newCat" placeholder="קטגוריה חדשה..." onkeydown="if(event.key==='Enter')addCat()">
      <button class="tag-add-btn" onclick="addCat()" id="addCatBtn">הוסף</button>
    </div>
    <div class="tags-list" id="catList"></div>

    <div class="sheet-sec" id="secDataTitle">נתונים</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="tag-add-btn" onclick="exportData()" style="flex:1;text-align:center">📤 <span id="exportLabel">ייצא רשימה</span></button>
      <button class="tag-add-btn" onclick="document.getElementById('importFile').click()" style="flex:1;text-align:center">📥 <span id="importLabel">ייבא רשימה</span></button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <div id="importMsg" style="font-size:12px;color:var(--ok);margin-top:8px;display:none"></div>

    <div class="sheet-sec" id="secDangerTitle">אזור סכנה</div>
    <button class="reset-btn" onclick="resetAllQty()" id="resetBtn">🔄 אפס את כל הכמויות ל-0</button>

    <button class="sheet-add-btn" onclick="hideSettings()" style="margin-top:14px" id="settingsCloseBtn">סגור</button>
  </div>
</div>

<!-- BRING SHEET -->
<div class="sheet-overlay" id="bringSheet" style="display:none" onclick="if(event.target===this)hideBring()">
  <div class="sheet sheet-lg">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="bringTitle">📋 מה להביא לבסיס</div>
    <div id="bringList"></div>
    <button class="sheet-add-btn" onclick="hideBring()" style="margin-top:8px" id="bringCloseBtn">סגור</button>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="sheet-overlay" id="confirmDialog" style="display:none">
  <div class="sheet" style="padding-bottom:22px">
    <div class="sheet-handle"></div>
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:7px" id="confirmMsg"></div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:18px" id="confirmSub"></div>
    <div style="display:flex;gap:10px">
      <button onclick="confirmResolve(false)" style="flex:1;height:44px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer" id="confirmCancel">ביטול</button>
      <button onclick="confirmResolve(true)"  style="flex:1;height:44px;background:var(--danger);border:none;border-radius:var(--radius);color:#fff;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer" id="confirmOk">מחק</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
